<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体（按需，系统字体时省略；只能用 Google 字体，CSS 地址前缀：https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google） -->
  <!-- <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/> -->

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>
  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #7C5CFF;
      --color-primary-container:    rgba(124,92,255,0.15);
      --color-on-primary:           #ffffff;
      /* === 强调色 === */
      --color-accent:               #69E7FF;
      --color-accent-container:     rgba(105,231,255,0.12);
      /* === 背景 / 表面（毛玻璃层级） === */
      --color-background:                 #070A14;
      --color-surface-container-lowest:   rgba(255,255,255,0.03);
      --color-surface:                    rgba(255,255,255,0.05);
      --color-surface-container:          rgba(255,255,255,0.08);
      --color-surface-container-high:     rgba(255,255,255,0.12);
      --color-surface-container-highest:  rgba(255,255,255,0.16);
      /* === 文字 === */
      --color-on-surface:           #F7FAFF;
      --color-on-surface-variant:   #9AA7C7;
      /* === 功能色 === */
      --color-success:  #62FAD3;
      --color-error:    #FF6B7A;
      --color-warning:  #F5A623;
      /* === 边框 === */
      --color-outline:          rgba(255,255,255,0.12);
      --color-outline-variant:  rgba(255,255,255,0.06);
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 12px rgba(0,0,0,0.35);
      --shadow-float:  0 10px 30px rgba(0,0,0,0.45);
      --shadow-dialog: 0 25px 60px rgba(0,0,0,0.55);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->
  <!-- 顶部导航栏 -->
  <header class="sticky top-0 z-50 h-16 flex items-center justify-between px-6 border-b border-outline-variant/30 bg-background/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center">
        <i data-lucide="brain" class="w-4.5 h-4.5 text-white"></i>
      </div>
      <span class="font-bold text-lg tracking-tight">GrowthMind</span>
    </div>
    <div class="flex items-center gap-3">
      <!-- 管理员视角切换器（仅管理员可见，普通用户隐藏） -->
      <select class="admin-only hidden bg-surface-container border-none rounded-lg px-3 py-1.5 text-sm text-on-surface focus:ring-2 focus:ring-primary/30">
        <option value="">我的视角</option>
        <option value="user_1">被监督用户：张三</option>
        <option value="user_2">被监督用户：李四</option>
      </select>
      <!-- 用户头像 -->
      <div class="relative" id="avatar-menu-trigger">
        <button class="w-8 h-8 rounded-full bg-primary-container text-primary font-semibold text-sm flex items-center justify-center hover:ring-2 hover:ring-primary/40 transition-all">初</button>
      </div>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 4rem)">
    <!-- 侧边栏 -->
    <aside class="w-56 shrink-0 overflow-y-auto border-r border-outline-variant/30 bg-background/60 backdrop-blur-lg">
      <div class="p-3 space-y-0.5">
        <a href="home.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-medium text-sm" aria-current="page">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>仪表盘
        </a>
        <a href="records.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="file-text" class="w-4 h-4"></i>记录列表
        </a>
        <a href="analysis.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="sparkles" class="w-4 h-4"></i>智能分析
        </a>
        <a href="goals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="target" class="w-4 h-4"></i>目标管理
        </a>
        <div class="my-2 border-t border-outline-variant/30"></div>
        <a href="supervise.html" class="admin-only hidden flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="users" class="w-4 h-4"></i>监督面板
        </a>
      </div>
    </aside>

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
      <!-- 页面内容 -->
    </main>
    <!-- @main-content:end -->
  </div>

  <!-- 头像下拉菜单 -->
  <div id="avatar-menu" class="hidden absolute right-6 top-14 z-50 w-48 bg-surface-container-highest backdrop-blur-xl border border-outline-variant/30 rounded-xl shadow-dialog p-1.5">
    <a href="gateway.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-on-surface-variant hover:bg-surface-container hover:text-on-surface transition-colors">
      <i data-lucide="cpu" class="w-4 h-4"></i>模型网关
    </a>
    <a href="login.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-on-surface-variant hover:bg-surface-container hover:text-on-surface transition-colors">
      <i data-lucide="log-out" class="w-4 h-4"></i>退出登录
    </a>
  </div>

  <script>
    // 头像菜单切换
    document.getElementById('avatar-menu-trigger').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('avatar-menu').classList.toggle('hidden');
    });
    document.addEventListener('click', function() {
      document.getElementById('avatar-menu').classList.add('hidden');
    });
    // 管理员功能可见性（原型阶段默认显示管理员视图）
    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
  </script>
  <script>lucide.createIcons();</script>
</body>

</html>

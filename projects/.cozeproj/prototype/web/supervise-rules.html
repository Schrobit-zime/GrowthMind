<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>
  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #7C5CFF;
      --color-primary-container:    rgba(124,92,255,0.15);
      --color-on-primary:           #ffffff;
      /* === 强调色 === */
      --color-accent:               #69E7FF;
      --color-accent-container:     rgba(105,231,255,0.12);
      /* === 背景 / 表面（毛玻璃层级） === */
      --color-background:                 #070A14;
      --color-surface-container-lowest:   rgba(255,255,255,0.03);
      --color-surface:                    rgba(255,255,255,0.05);
      --color-surface-container:          rgba(255,255,255,0.08);
      --color-surface-container-high:     rgba(255,255,255,0.12);
      --color-surface-container-highest:  rgba(255,255,255,0.16);
      /* === 文字 === */
      --color-on-surface:           #F7FAFF;
      --color-on-surface-variant:   #9AA7C7;
      /* === 功能色 === */
      --color-success:  #62FAD3;
      --color-error:    #FF6B7A;
      --color-warning:  #F5A623;
      /* === 边框 === */
      --color-outline:          rgba(255,255,255,0.12);
      --color-outline-variant:  rgba(255,255,255,0.06);
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 12px rgba(0,0,0,0.35);
      --shadow-float:  0 10px 30px rgba(0,0,0,0.45);
      --shadow-dialog: 0 25px 60px rgba(0,0,0,0.55);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen">

  <!-- 简化顶栏：返回按钮 + 用户名 -->
  <header class="sticky top-0 z-50 h-16 flex items-center justify-between px-6 border-b border-outline-variant/30 bg-background/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <button id="btn-back" class="flex items-center gap-1.5 text-on-surface-variant hover:text-on-surface transition-colors text-sm font-medium">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>返回
      </button>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-on-surface-variant">被监督用户：</span>
      <span class="text-sm font-semibold text-on-surface">张三</span>
      <div class="w-7 h-7 rounded-full bg-primary-container text-primary font-semibold text-xs flex items-center justify-center">张</div>
    </div>
  </header>

  <!-- @main-content:start -->
  <main class="max-w-4xl mx-auto px-6 py-8">

    <!-- 页面标题区 -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-on-surface">提醒规则配置</h1>
        <p class="text-sm text-on-surface-variant mt-1">为张三配置智能提醒规则，当触发条件满足时自动通知</p>
      </div>
      <button id="btn-add-rule" class="bg-primary text-on-primary px-4 py-2 rounded-md text-sm font-medium
                     hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center gap-2">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i>新增规则
      </button>
    </div>

    <!-- 规则列表 -->
    <div class="space-y-4" id="rules-list">

      <!-- 列表-规则1：未记录提醒 -->
      <div class="bg-surface rounded-xl shadow-card p-5 rule-item" id="rule-1" data-rule-id="1">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <!-- 规则类型标签 + 启用状态 -->
            <div class="flex items-center gap-3 mb-3">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold bg-warning/15 text-warning">
                <i data-lucide="clock" class="w-3 h-3"></i>未记录提醒
              </span>
              <span class="inline-flex items-center px-2 py-0.5 rounded-sm text-xs font-medium bg-success/15 text-success">已启用</span>
            </div>
            <!-- 条件描述 -->
            <p class="text-sm text-on-surface mb-3">
              当用户<span class="font-semibold text-on-surface">连续 3 天</span>未提交任何记录时触发
            </p>
            <!-- 触发动作标签 -->
            <div class="flex items-center gap-2 flex-wrap">
              <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-xs bg-surface-container-high text-on-surface-variant">
                <i data-lucide="bell" class="w-3 h-3"></i>通知管理员
              </span>
              <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-xs bg-surface-container-high text-on-surface-variant">
                <i data-lucide="mail" class="w-3 h-3"></i>发送邮件
              </span>
            </div>
          </div>
          <!-- 操作区 -->
          <div class="flex items-center gap-3 shrink-0">
            <!-- Toggle 开关 -->
            <button class="toggle-switch relative w-10 h-5 rounded-full transition-colors bg-success" id="toggle-1" data-rule-id="1">
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform translate-x-5"></span>
            </button>
            <button class="btn-edit-rule p-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors" id="btn-edit-1" data-rule-id="1">
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button class="btn-delete-rule p-1.5 rounded-md text-on-surface-variant hover:text-error hover:bg-error/10 transition-colors" id="btn-delete-1" data-rule-id="1">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 列表-规则2：目标滞后 -->
      <div class="bg-surface rounded-xl shadow-card p-5 rule-item" id="rule-2" data-rule-id="2">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-3 mb-3">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold bg-error/15 text-error">
                <i data-lucide="target" class="w-3 h-3"></i>目标滞后
              </span>
              <span class="inline-flex items-center px-2 py-0.5 rounded-sm text-xs font-medium bg-success/15 text-success">已启用</span>
            </div>
            <p class="text-sm text-on-surface mb-3">
              当目标<span class="font-semibold text-on-surface">进度落后 20%</span>以上时触发（对比预期进度线）
            </p>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-xs bg-surface-container-high text-on-surface-variant">
                <i data-lucide="bell" class="w-3 h-3"></i>通知管理员
              </span>
            </div>
          </div>
          <div class="flex items-center gap-3 shrink-0">
            <button class="toggle-switch relative w-10 h-5 rounded-full transition-colors bg-success" id="toggle-2" data-rule-id="2">
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform translate-x-5"></span>
            </button>
            <button class="btn-edit-rule p-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors" id="btn-edit-2" data-rule-id="2">
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button class="btn-delete-rule p-1.5 rounded-md text-on-surface-variant hover:text-error hover:bg-error/10 transition-colors" id="btn-delete-2" data-rule-id="2">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 列表-规则3：心情下降 -->
      <div class="bg-surface rounded-xl shadow-card p-5 rule-item" id="rule-3" data-rule-id="3">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-3 mb-3">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold bg-accent/15 text-accent">
                <i data-lucide="heart" class="w-3 h-3"></i>心情下降
              </span>
              <span class="inline-flex items-center px-2 py-0.5 rounded-sm text-xs font-medium bg-surface-container-high text-on-surface-variant">已禁用</span>
            </div>
            <p class="text-sm text-on-surface mb-3">
              当心情评分<span class="font-semibold text-on-surface">连续低于 5 分</span>时触发（取最近 7 天均值）
            </p>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-xs bg-surface-container-high text-on-surface-variant">
                <i data-lucide="user" class="w-3 h-3"></i>通知用户
              </span>
            </div>
          </div>
          <div class="flex items-center gap-3 shrink-0">
            <button class="toggle-switch relative w-10 h-5 rounded-full transition-colors bg-surface-container-high" id="toggle-3" data-rule-id="3">
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-on-surface-variant shadow transition-transform translate-x-0"></span>
            </button>
            <button class="btn-edit-rule p-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors" id="btn-edit-3" data-rule-id="3">
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button class="btn-delete-rule p-1.5 rounded-md text-on-surface-variant hover:text-error hover:bg-error/10 transition-colors" id="btn-delete-3" data-rule-id="3">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- 底部面板：规则表单 -->
    <div id="rule-form-panel" class="hidden fixed inset-0 z-50">
      <!-- 遮罩层 -->
      <div id="rule-form-overlay" class="absolute inset-0 bg-black/50"></div>
      <!-- 面板 -->
      <div class="absolute bottom-0 left-0 right-0 bg-surface-container-highest backdrop-blur-xl border-t border-outline-variant/30 rounded-t-2xl shadow-dialog max-h-[85vh] overflow-y-auto">
        <div class="max-w-4xl mx-auto p-6">
          <!-- 面板标题 -->
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-bold text-on-surface" id="rule-form-title">新增提醒规则</h2>
            <button id="btn-close-form" class="p-1.5 rounded-md text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>

          <!-- 表单内容 -->
          <div class="space-y-5">
            <!-- 规则类型选择 -->
            <div>
              <label class="block text-sm font-medium text-on-surface mb-2">规则类型</label>
              <div class="grid grid-cols-2 gap-3" id="rule-type-options">
                <button class="rule-type-option flex items-start gap-3 p-3 rounded-lg border border-outline-variant/30 bg-surface hover:bg-surface-container transition-colors text-left" data-type="missed_record">
                  <div class="w-8 h-8 rounded-md bg-warning/15 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="clock" class="w-4 h-4 text-warning"></i>
                  </div>
                  <div>
                    <span class="text-sm font-semibold text-on-surface">未记录提醒</span>
                    <p class="text-xs text-on-surface-variant mt-0.5">用户长时间未提交记录时触发</p>
                  </div>
                </button>
                <button class="rule-type-option flex items-start gap-3 p-3 rounded-lg border border-outline-variant/30 bg-surface hover:bg-surface-container transition-colors text-left" data-type="goal_lag">
                  <div class="w-8 h-8 rounded-md bg-error/15 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="target" class="w-4 h-4 text-error"></i>
                  </div>
                  <div>
                    <span class="text-sm font-semibold text-on-surface">目标滞后</span>
                    <p class="text-xs text-on-surface-variant mt-0.5">目标进度落后于预期时触发</p>
                  </div>
                </button>
                <button class="rule-type-option flex items-start gap-3 p-3 rounded-lg border border-outline-variant/30 bg-surface hover:bg-surface-container transition-colors text-left" data-type="mood_drop">
                  <div class="w-8 h-8 rounded-md bg-accent/15 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="heart" class="w-4 h-4 text-accent"></i>
                  </div>
                  <div>
                    <span class="text-sm font-semibold text-on-surface">心情下降</span>
                    <p class="text-xs text-on-surface-variant mt-0.5">心情评分持续走低时触发</p>
                  </div>
                </button>
                <button class="rule-type-option flex items-start gap-3 p-3 rounded-lg border border-outline-variant/30 bg-surface hover:bg-surface-container transition-colors text-left" data-type="custom">
                  <div class="w-8 h-8 rounded-md bg-primary/15 flex items-center justify-center shrink-0 mt-0.5">
                    <i data-lucide="settings" class="w-4 h-4 text-primary"></i>
                  </div>
                  <div>
                    <span class="text-sm font-semibold text-on-surface">自定义</span>
                    <p class="text-xs text-on-surface-variant mt-0.5">自定义指标与触发条件</p>
                  </div>
                </button>
              </div>
            </div>

            <!-- 条件参数配置 -->
            <div>
              <label class="block text-sm font-medium text-on-surface mb-2">条件参数</label>
              <div class="grid grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs text-on-surface-variant mb-1">指标</label>
                  <select id="rule-metric" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors">
                    <option value="record_days">连续未记录天数</option>
                    <option value="goal_progress">目标进度偏差</option>
                    <option value="mood_score">心情评分</option>
                    <option value="record_count">记录数量</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs text-on-surface-variant mb-1">运算符</label>
                  <select id="rule-operator" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors">
                    <option value="gt">大于</option>
                    <option value="lt">小于</option>
                    <option value="eq">等于</option>
                    <option value="gte">大于等于</option>
                    <option value="lte">小于等于</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs text-on-surface-variant mb-1">阈值</label>
                  <input id="rule-threshold" type="number" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="输入数值" value="3" />
                </div>
              </div>
              <div class="mt-3">
                <label class="block text-xs text-on-surface-variant mb-1">统计周期（天）</label>
                <input id="rule-period" type="number" class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="如 7 表示最近 7 天" value="7" />
              </div>
            </div>

            <!-- 触发动作多选 -->
            <div>
              <label class="block text-sm font-medium text-on-surface mb-2">触发动作</label>
              <div class="flex items-center gap-4 flex-wrap">
                <label class="flex items-center gap-2 cursor-pointer" id="action-notify-admin-label">
                  <input type="checkbox" id="action-notify-admin" class="w-4 h-4 rounded accent-primary" checked />
                  <span class="text-sm text-on-surface">通知管理员</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer" id="action-notify-user-label">
                  <input type="checkbox" id="action-notify-user" class="w-4 h-4 rounded accent-primary" />
                  <span class="text-sm text-on-surface">通知用户</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer" id="action-send-email-label">
                  <input type="checkbox" id="action-send-email" class="w-4 h-4 rounded accent-primary" />
                  <span class="text-sm text-on-surface">发送邮件</span>
                </label>
              </div>
            </div>

            <!-- 启用状态 -->
            <div class="flex items-center gap-3">
              <label class="text-sm font-medium text-on-surface">启用规则</label>
              <button id="form-toggle" class="toggle-switch relative w-10 h-5 rounded-full transition-colors bg-success">
                <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform translate-x-5"></span>
              </button>
            </div>
          </div>

          <!-- 操作按钮 -->
          <div class="flex items-center justify-end gap-3 mt-8 pt-5 border-t border-outline-variant/30">
            <button id="btn-cancel-form" class="bg-surface-container text-on-surface border-none px-5 py-2.5 rounded-md text-sm font-medium
                           hover:bg-surface-container-high active:scale-[0.98] transition-all">取消</button>
            <button id="btn-save-form" class="bg-primary text-on-primary px-5 py-2.5 rounded-md text-sm font-medium
                           hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center gap-2">
              <i data-lucide="check" class="w-3.5 h-3.5"></i>保存规则
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="modal-delete-rule" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
      <div class="bg-surface rounded-xl shadow-dialog max-w-sm w-full p-6">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-error/15 flex items-center justify-center shrink-0">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-error"></i>
          </div>
          <div>
            <h3 class="text-base font-semibold text-on-surface">确认删除规则</h3>
            <p class="text-xs text-on-surface-variant mt-0.5">此操作不可撤销</p>
          </div>
        </div>
        <p class="text-sm text-on-surface-variant mb-2" id="delete-rule-name">将删除提醒规则，已触发的历史通知不受影响。</p>
        <p class="text-xs text-on-surface-variant/70 mb-6">删除后，该规则将不再对用户生效。</p>
        <div class="flex items-center justify-end gap-3">
          <button id="btn-cancel-delete" class="bg-surface-container text-on-surface border-none px-4 py-2 rounded-md text-sm font-medium
                         hover:bg-surface-container-high active:scale-[0.98] transition-all">取消</button>
          <button id="btn-confirm-delete" class="bg-error text-white px-4 py-2 rounded-md text-sm font-medium
                         hover:opacity-90 active:scale-[0.98] transition-all">确认删除</button>
        </div>
      </div>
    </div>

  </main>
  <!-- @main-content:end -->

  <script>
    $(function() {

      // ========== 返回按钮 ==========
      $('#btn-back').on('click', function() {
        window.location.href = 'supervise-user-detail.html';
      });

      // ========== Toggle 开关 ==========
      $('.toggle-switch').on('click', function() {
        var $btn = $(this);
        var $dot = $btn.find('span');
        var ruleId = $btn.data('rule-id');

        if ($btn.hasClass('bg-success')) {
          // 当前启用 → 禁用
          $btn.removeClass('bg-success').addClass('bg-surface-container-high');
          $dot.removeClass('translate-x-5').addClass('translate-x-0');
          $dot.removeClass('bg-white').addClass('bg-on-surface-variant');
          // 更新状态标签
          var $statusBadge = $btn.closest('.rule-item').find('.bg-success\\/15');
          if ($statusBadge.length) {
            $statusBadge.removeClass('bg-success/15 text-success')
              .addClass('bg-surface-container-high text-on-surface-variant')
              .text('已禁用');
          }
          console.log('规则 ' + ruleId + ' 已禁用');
        } else {
          // 当前禁用 → 启用
          $btn.removeClass('bg-surface-container-high').addClass('bg-success');
          $dot.removeClass('translate-x-0').addClass('translate-x-5');
          $dot.removeClass('bg-on-surface-variant').addClass('bg-white');
          var $statusBadge = $btn.closest('.rule-item').find('.bg-surface-container-high');
          if ($statusBadge.length && $statusBadge.text().trim() === '已禁用') {
            $statusBadge.removeClass('bg-surface-container-high text-on-surface-variant')
              .addClass('bg-success/15 text-success')
              .text('已启用');
          }
          console.log('规则 ' + ruleId + ' 已启用');
        }
      });

      // ========== 新增规则按钮 → 打开底部面板 ==========
      $('#btn-add-rule').on('click', function() {
        $('#rule-form-title').text('新增提醒规则');
        // 重置表单
        $('#rule-metric').val('record_days');
        $('#rule-operator').val('gt');
        $('#rule-threshold').val('3');
        $('#rule-period').val('7');
        $('#action-notify-admin').prop('checked', true);
        $('#action-notify-user').prop('checked', false);
        $('#action-send-email').prop('checked', false);
        $('#form-toggle').removeClass('bg-surface-container-high').addClass('bg-success');
        $('#form-toggle span').removeClass('translate-x-0 bg-on-surface-variant').addClass('translate-x-5 bg-white');
        // 清除规则类型选中态
        $('.rule-type-option').removeClass('border-primary bg-primary/5');
        $('.rule-type-option[data-type="missed_record"]').addClass('border-primary bg-primary/5');
        // 显示面板
        $('#rule-form-panel').removeClass('hidden');
        // 刷新图标
        lucide.createIcons();
      });

      // ========== 编辑按钮 → 打开底部面板（预填数据） ==========
      $('.btn-edit-rule').on('click', function() {
        var ruleId = $(this).data('rule-id');
        $('#rule-form-title').text('编辑提醒规则');
        // 根据 ruleId 预填表单数据
        // 编辑功能 - 后续应实现：
        // 1. 根据 ruleId 从后端获取规则详情
        // 2. 预填规则类型选中态、条件参数、触发动作、启用状态
        // 3. 保存时调用 PUT /api/v1/supervise/rules/:ruleId 更新规则
        // 4. 保存成功后关闭面板并刷新规则列表
        console.log('编辑规则:', ruleId);
        $('#rule-form-panel').removeClass('hidden');
        lucide.createIcons();
      });

      // ========== 删除按钮 → 弹出确认弹窗 ==========
      $('.btn-delete-rule').on('click', function() {
        var ruleId = $(this).data('rule-id');
        var $ruleItem = $(this).closest('.rule-item');
        var ruleTypeText = $ruleItem.find('.font-semibold').first().text() || '提醒规则';
        $('#delete-rule-name').text('将删除"' + ruleTypeText + '"提醒规则，已触发的历史通知不受影响。');
        $('#modal-delete-rule').data('rule-id', ruleId).removeClass('hidden');
      });

      // 取消删除
      $('#btn-cancel-delete').on('click', function() {
        $('#modal-delete-rule').addClass('hidden');
      });

      // 确认删除
      $('#btn-confirm-delete').on('click', function() {
        var ruleId = $('#modal-delete-rule').data('rule-id');
        // 删除功能 - 后续应实现：
        // 1. 调用 DELETE /api/v1/supervise/rules/:ruleId 删除规则
        // 2. 删除成功后从 DOM 中移除对应 .rule-item
        // 3. 如果列表为空，显示空状态提示
        console.log('确认删除规则:', ruleId);
        $('#rule-' + ruleId).remove();
        $('#modal-delete-rule').addClass('hidden');
      });

      // 点击遮罩关闭删除弹窗
      $('#modal-delete-rule').on('click', function(e) {
        if (e.target === this) {
          $(this).addClass('hidden');
        }
      });

      // ========== 底部面板交互 ==========

      // 规则类型选择
      $('.rule-type-option').on('click', function() {
        $('.rule-type-option').removeClass('border-primary bg-primary/5');
        $(this).addClass('border-primary bg-primary/5');
        var type = $(this).data('type');
        // 根据类型预填条件参数
        // 后续应实现：根据规则类型自动切换指标、运算符、阈值的默认值
        console.log('选择规则类型:', type);
      });

      // 表单 Toggle
      $('#form-toggle').on('click', function() {
        var $btn = $(this);
        var $dot = $btn.find('span');
        if ($btn.hasClass('bg-success')) {
          $btn.removeClass('bg-success').addClass('bg-surface-container-high');
          $dot.removeClass('translate-x-5 bg-white').addClass('translate-x-0 bg-on-surface-variant');
        } else {
          $btn.removeClass('bg-surface-container-high').addClass('bg-success');
          $dot.removeClass('translate-x-0 bg-on-surface-variant').addClass('translate-x-5 bg-white');
        }
      });

      // 关闭面板
      $('#btn-close-form, #btn-cancel-form').on('click', function() {
        $('#rule-form-panel').addClass('hidden');
      });

      // 点击遮罩关闭面板
      $('#rule-form-overlay').on('click', function() {
        $('#rule-form-panel').addClass('hidden');
      });

      // 保存规则
      $('#btn-save-form').on('click', function() {
        // 收集表单数据
        var ruleData = {
          type: $('.rule-type-option.border-primary').data('type'),
          metric: $('#rule-metric').val(),
          operator: $('#rule-operator').val(),
          threshold: $('#rule-threshold').val(),
          period: $('#rule-period').val(),
          actions: {
            notify_admin: $('#action-notify-admin').is(':checked'),
            notify_user: $('#action-notify-user').is(':checked'),
            send_email: $('#action-send-email').is(':checked')
          },
          enabled: $('#form-toggle').hasClass('bg-success')
        };
        // 保存功能 - 后续应实现：
        // 1. 校验表单数据完整性（类型、阈值必填，至少选一个触发动作）
        // 2. 新增时调用 POST /api/v1/supervise/rules，编辑时调用 PUT /api/v1/supervise/rules/:ruleId
        // 3. 保存成功后关闭面板，刷新规则列表
        // 4. 保存失败时显示错误提示
        console.log('保存规则数据:', ruleData);
        $('#rule-form-panel').addClass('hidden');
      });

      // ========== 初始化图标 ==========
      lucide.createIcons();
    });
  </script>
</body>

</html>
